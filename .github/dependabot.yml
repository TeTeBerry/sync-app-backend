version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'typescript'
          - 'eslint*'
