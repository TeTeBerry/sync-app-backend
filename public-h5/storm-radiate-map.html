<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>STORM · Radiate 3D Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06040f; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    #map { width: 100%; height: 100%; }
    .vignette {
      pointer-events: none;
      position: fixed; inset: 0; z-index: 2;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(140, 80, 255, 0.2), transparent 60%),
        linear-gradient(180deg, rgba(6, 4, 15, 0.35) 0%, transparent 18%, transparent 72%, rgba(6, 4, 15, 0.75) 100%);
    }
    .hud {
      position: fixed; z-index: 10; left: 0; right: 0; top: 0;
      padding: calc(10px + env(safe-area-inset-top, 0)) 14px 10px;
      pointer-events: none;
    }
    .hud__row { display: flex; align-items: flex-start; gap: 10px; pointer-events: auto; }
    .hud__back {
      display: none;
      padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(12, 8, 24, 0.85); color: #fff; font-size: 12px; cursor: pointer;
    }
    .hud__back.is-on { display: inline-block; }
    .hud__title { flex: 1; min-width: 0; }
    .hud__title h1 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
    .hud__title p { margin-top: 3px; color: rgba(255,255,255,0.65); font-size: 11px; line-height: 1.35; }
    .hud__chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; pointer-events: none; }
    .chip {
      padding: 3px 8px; border-radius: 999px; font-size: 10px; color: #fff;
      border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.35);
    }
    .chip--storm { border-color: #ff55aa88; color: #ffc4e8; }
    .chip--cyan { border-color: #55ddff66; color: #aaf0ff; }
    .card {
      position: fixed; z-index: 20; left: 14px; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom, 0));
      padding: 14px 16px; border-radius: 16px;
      background: rgba(14, 10, 28, 0.92); border: 1px solid rgba(180, 120, 255, 0.35);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55); transform: translateY(120%); opacity: 0;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s;
      pointer-events: none;
    }
    .card.is-open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .card__tag { font-size: 10px; color: #c4b5fd; text-transform: uppercase; letter-spacing: 0.08em; }
    .card__title { margin-top: 4px; color: #fff; font-size: 17px; font-weight: 700; }
    .card__body { margin-top: 6px; color: rgba(255,255,255,0.72); font-size: 12px; line-height: 1.45; }
    .card__close {
      margin-top: 12px; width: 100%; padding: 10px; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #7c3aed, #ec4899); color: #fff; font-size: 13px; font-weight: 600;
    }
    .loader {
      position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #06040f; color: #fff;
    }
    .loader.hidden { display: none; }
    .loader__spin {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15); border-top-color: #c084fc;
      animation: spin 0.8s linear infinite;
    }
  @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #ff8a8a; font-size: 12px; margin-top: 12px; padding: 0 24px; text-align: center; }
  </style>
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader__spin"></div>
    <p style="margin-top:14px;font-size:13px;">加载 TLBS GL 3D 地图…</p>
    <p id="err" class="err" hidden></p>
  </div>
  <div id="map"></div>
  <div class="vignette" aria-hidden="true"></div>
  <header class="hud">
    <div class="hud__row">
      <button type="button" id="btnBack" class="hud__back">← 返回城市</button>
      <div class="hud__title">
        <h1 id="hudTitle">深圳 · 3D 夜城</h1>
        <p id="hudSub">点击国际会展中心玫红脉冲区进入 STORM 场内沙盘</p>
      </div>
    </div>
    <div class="hud__chip-row" id="hudChips">
      <span class="chip chip--storm">STORM 17号馆</span>
      <span class="chip">紫粉赛博夜</span>
      <span class="chip chip--cyan">接驳 / After</span>
    </div>
  </header>
  <aside id="card" class="card" role="dialog" aria-hidden="true">
    <div class="card__tag" id="cardTag">区域</div>
    <div class="card__title" id="cardTitle">—</div>
    <div class="card__body" id="cardBody"></div>
    <button type="button" class="card__close" id="cardClose">关闭</button>
  </aside>

  <script>
(function () {
  'use strict';

  var GEOJSON = {"type":"FeatureCollection","features":[
    {"type":"Feature","properties":{"name":"主舞台 MAIN STAGE","areaType":"stage","extrudeHeight":28,"fillColor":"#f8f8f8","borderColor":"#ffffff"},"geometry":{"type":"Polygon","coordinates":[[[113.77322,22.69882],[113.77505,22.6989],[113.77512,22.69761],[113.77318,22.69753],[113.77322,22.69882]]]}},
    {"type":"Feature","properties":{"name":"VIP 卡座区","areaType":"vip","extrudeHeight":16,"fillColor":"#991a2c","borderColor":"#ff4455"},"geometry":{"type":"Polygon","coordinates":[[[113.77271,22.69742],[113.77559,22.69751],[113.77552,22.69673],[113.77268,22.69664],[113.77271,22.69742]]]}},
    {"type":"Feature","properties":{"name":"A 舞池","areaType":"danceA","extrudeHeight":10,"fillColor":"#ff55aa","borderColor":"#ff99cc"},"geometry":{"type":"Polygon","coordinates":[[[113.77222,22.69652],[113.77401,22.69659],[113.77396,22.69561],[113.77219,22.69555],[113.77222,22.69652]]]}},
    {"type":"Feature","properties":{"name":"B 舞池","areaType":"danceB","extrudeHeight":10,"fillColor":"#ff55aa","borderColor":"#ff99cc"},"geometry":{"type":"Polygon","coordinates":[[[113.77438,22.69656],[113.77615,22.69663],[113.77609,22.69558],[113.77435,22.69552],[113.77438,22.69656]]]}},
    {"type":"Feature","properties":{"name":"美食服务区","areaType":"food","extrudeHeight":5,"fillColor":"#e69933","borderColor":"#ffbb55"},"geometry":{"type":"Polygon","coordinates":[[[113.77211,22.69532],[113.77628,22.69538],[113.77622,22.69461],[113.77208,22.69456],[113.77211,22.69532]]]}},
    {"type":"Feature","properties":{"name":"主出入口","areaType":"gate","extrudeHeight":2,"fillColor":"#33bb55","borderColor":"#66ee88"},"geometry":{"type":"Polygon","coordinates":[[[113.77362,22.69441],[113.77479,22.69445],[113.77475,22.69398],[113.77359,22.69394],[113.77362,22.69441]]]}}
  ]};

  var qs = new URLSearchParams(location.search);
  var MAP_KEY = qs.get('key') || '';
  var INIT_LAYER = qs.get('layer') === 'venue' ? 'venue' : 'city';

  var SHENZHEN = { lat: 22.62, lng: 113.92 };
  var VENUE = { lat: 22.69642, lng: 113.77418 };
  var VENUE_NAME = '深圳国际会展中心 17号馆';

  var STORM_LOGO_SVG =
    'data:image/svg+xml,' +
    encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72">' +
        '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
        '<stop offset="0%" stop-color="#f0f0ff"/><stop offset="45%" stop-color="#c4a0ff"/>' +
        '<stop offset="100%" stop-color="#ff55aa"/></linearGradient></defs>' +
        '<path fill="url(#g)" stroke="#fff" stroke-width="2" d="M32 6 L58 66 L6 66 Z"/>' +
        '</svg>'
    );

  var map = null;
  var layerMode = 'city';
  var t0 = performance.now();
  var pulsePhase = 0;

  var layers = {
    hallPulse: null,
    hallHit: null,
    clubs: null,
    cyan: null,
    stormLogo: null,
    crowd: null,
    venueBlocks: null,
    heat: null,
    friends: null,
    friendLines: null,
    navLine: null,
    stageRing: null,
  };

  var crowdState = [];
  var heatState = [];
  var navPath = [];

  function $(id) { return document.getElementById(id); }
  function showErr(msg) {
    $('err').hidden = false;
    $('err').textContent = msg;
  }
  function latLng(lat, lng) { return new TMap.LatLng(lat, lng); }
  function ringToPaths(ring) {
    var pts = ring.slice(0, -1);
    return pts.map(function (p) { return latLng(p[1], p[0]); });
  }
  function boundsOfGeo() {
    var minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
    GEOJSON.features.forEach(function (f) {
      f.geometry.coordinates[0].forEach(function (p) {
        minLng = Math.min(minLng, p[0]); maxLng = Math.max(maxLng, p[0]);
        minLat = Math.min(minLat, p[1]); maxLat = Math.max(maxLat, p[1]);
      });
    });
    return { minLng: minLng, maxLng: maxLng, minLat: minLat, maxLat: maxLat };
  }
  var HALL = boundsOfGeo();
  function hallRingLatLng() {
    return [
      latLng(HALL.maxLat, HALL.minLng),
      latLng(HALL.maxLat, HALL.maxLng),
      latLng(HALL.minLat, HALL.maxLng),
      latLng(HALL.minLat, HALL.minLng),
    ];
  }

  function postToMiniProgram(payload) {
    try {
      if (window.wx && wx.miniProgram && wx.miniProgram.postMessage) {
        wx.miniProgram.postMessage({ data: payload });
      }
    } catch (e) { /* ignore */ }
  }

  function openCard(tag, title, body) {
    $('cardTag').textContent = tag;
    $('cardTitle').textContent = title;
    $('cardBody').textContent = body || '';
    $('card').classList.add('is-open');
    $('card').setAttribute('aria-hidden', 'false');
  }
  function closeCard() {
    $('card').classList.remove('is-open');
    $('card').setAttribute('aria-hidden', 'true');
  }
  $('cardClose').addEventListener('click', closeCard);

  function setHud(mode) {
    if (mode === 'venue') {
      $('hudTitle').textContent = 'STORM · 场内 3D 沙盘';
      $('hudSub').textContent = '点击区域 / 头像查看详情 · 双指缩放旋转';
      $('btnBack').classList.add('is-on');
      $('hudChips').innerHTML =
        '<span class="chip chip--storm">主舞台</span><span class="chip">VIP</span><span class="chip">舞池</span><span class="chip chip--cyan">导航线</span>';
    } else {
      $('hudTitle').textContent = '深圳 · 3D 夜城';
      $('hudSub').textContent = '点击国际会展中心玫红脉冲区进入 STORM 场内沙盘';
      $('btnBack').classList.remove('is-on');
      $('hudChips').innerHTML =
        '<span class="chip chip--storm">STORM 17号馆</span><span class="chip">紫粉赛博夜</span><span class="chip chip--cyan">接驳 / After</span>';
    }
  }

  function easeMap(opts, duration) {
    if (!map || !map.easeTo) {
      map.setCenter(opts.center);
      if (opts.zoom != null) map.setZoom(opts.zoom);
      if (opts.pitch != null) map.setPitch(opts.pitch);
      if (opts.rotation != null) map.setRotation(opts.rotation);
      return;
    }
    map.easeTo(Object.assign({ duration: duration || 1200 }, opts));
  }

  function setLayerVisible(layer, on) {
    if (!layer) return;
    if (layer.setMap) {
      layer.setMap(on ? map : null);
    }
    if (layer.setVisible) {
      layer.setVisible(on);
    }
  }

  function buildCityLayers() {
    var hallPaths = hallRingLatLng();

    layers.hallPulse = new TMap.MultiPolygon({
      id: 'hall-pulse',
      map: map,
      zIndex: 20,
      styles: {
        pulse: new TMap.PolygonStyle({
          color: 'rgba(255, 40, 120, 0.42)',
          showBorder: true,
          borderColor: 'rgba(255, 100, 180, 0.95)',
          borderWidth: 2,
        }),
      },
      geometries: [{ id: 'hall-pulse-geom', styleId: 'pulse', paths: hallPaths }],
    });

    layers.hallHit = new TMap.MultiPolygon({
      id: 'hall-hit',
      map: map,
      zIndex: 21,
      styles: {
        hit: new TMap.PolygonStyle({ color: 'rgba(255,0,120,0.01)', showBorder: false }),
      },
      geometries: [{ id: 'hall-hit-geom', styleId: 'hit', paths: hallPaths }],
    });
    layers.hallHit.on('click', function () { enterVenue(); });

    var clubs = [
      { id: 'c1', name: 'OIL', lat: 22.532, lng: 114.055 },
      { id: 'c2', name: '西西弗', lat: 22.518, lng: 114.064 },
      { id: 'c3', name: 'PP', lat: 22.541, lng: 114.028 },
      { id: 'c4', name: '九号', lat: 22.508, lng: 114.132 },
      { id: 'c5', name: 'Viva', lat: 22.527, lng: 113.943 },
    ];
    layers.clubs = new TMap.MultiMarker({
      id: 'clubs',
      map: map,
      zIndex: 30,
      styles: {
        club: new TMap.MarkerStyle({
          width: 10, height: 10, anchor: { x: 5, y: 5 },
          src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><circle cx="5" cy="5" r="4" fill="#b794f6" opacity="0.85"/></svg>'),
        }),
      },
      geometries: clubs.map(function (c) {
        return { id: c.id, styleId: 'club', position: latLng(c.lat, c.lng), properties: c };
      }),
    });

    var cyanPts = [
      { id: 'p1', name: 'P1 停车场', lat: 22.6948, lng: 113.7685 },
      { id: 'p2', name: 'P2 停车场', lat: 22.6985, lng: 113.7795 },
      { id: 'a1', name: 'After · 沙井', lat: 22.688, lng: 113.782 },
      { id: 'a2', name: 'After · 福永', lat: 22.702, lng: 113.765 },
    ];
    layers.cyan = new TMap.MultiMarker({
      id: 'cyan-points',
      map: map,
      zIndex: 31,
      styles: {
        cyan: new TMap.MarkerStyle({
          width: 8, height: 8, anchor: { x: 4, y: 4 },
          src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8"><circle cx="4" cy="4" r="3.5" fill="#55eeff"/></svg>'),
        }),
      },
      geometries: cyanPts.map(function (p) {
        return { id: p.id, styleId: 'cyan', position: latLng(p.lat, p.lng), properties: p };
      }),
    });

    layers.stormLogo = new TMap.MultiMarker({
      id: 'storm-logo',
      map: map,
      zIndex: 50,
      styles: {
        logo: new TMap.MarkerStyle({
          width: 52, height: 58, anchor: { x: 26, y: 50 },
          src: STORM_LOGO_SVG,
        }),
      },
      geometries: [{
        id: 'storm-logo-geom',
        styleId: 'logo',
        position: latLng(VENUE.lat + 0.00035, VENUE.lng),
        properties: { name: 'STORM' },
      }],
    });
    layers.stormLogo.on('click', enterVenue);

    crowdState = [
      { id: 'u1', name: 'Nova', color: '#ff55aa', lat: 22.55, lng: 114.02, tLat: VENUE.lat, tLng: VENUE.lng - 0.001 },
      { id: 'u2', name: 'Kira', color: '#55ccff', lat: 22.53, lng: 114.05, tLat: VENUE.lat - 0.0005, tLng: VENUE.lng + 0.001 },
      { id: 'u3', name: 'Milo', color: '#aaff66', lat: 22.58, lng: 113.98, tLat: VENUE.lat + 0.0003, tLng: VENUE.lng - 0.0008 },
      { id: 'u4', name: 'Luna', color: '#cc88ff', lat: 22.51, lng: 114.08, tLat: VENUE.lat - 0.0003, tLng: VENUE.lng + 0.0006 },
    ];
    layers.crowd = new TMap.MultiMarker({
      id: 'crowd',
      map: map,
      zIndex: 40,
      styles: {
        ava: new TMap.MarkerStyle({
          width: 28, height: 28, anchor: { x: 14, y: 14 },
          src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><circle cx="14" cy="14" r="12" fill="#1a1030" stroke="#fff" stroke-width="2"/></svg>'),
        }),
      },
      geometries: crowdState.map(function (u) {
        return { id: u.id, styleId: 'ava', position: latLng(u.lat, u.lng), properties: u };
      }),
    });
    layers.crowd.on('click', function (evt) {
      var p = evt.geometry && evt.geometry.properties;
      if (p) openCard('用户', p.name, '意向到场 · 正前往 ' + VENUE_NAME);
    });
  }

  function buildVenueLayers() {
    var styles = {};
    var geometries = [];
    GEOJSON.features.forEach(function (f, idx) {
      var p = f.properties;
      var sid = 'z-' + p.areaType;
      if (!styles[sid]) {
        styles[sid] = new TMap.ExtrudablePolygonStyle({
          color: hexToRgba(p.fillColor, 0.82),
          showBorder: true,
          borderColor: p.borderColor,
          extrudeHeight: p.extrudeHeight,
        });
      }
      geometries.push({
        id: 'zone-' + idx,
        styleId: sid,
        paths: ringToPaths(f.geometry.coordinates[0]),
        properties: p,
      });
    });

    layers.venueBlocks = new TMap.MultiPolygon({
      id: 'venue-blocks',
      map: null,
      zIndex: 60,
      styles: styles,
      geometries: geometries,
    });
    layers.venueBlocks.on('click', function (evt) {
      var pr = evt.geometry && evt.geometry.properties;
      if (!pr) return;
      var hint = {
        stage: '主舞台 · 最高 28m · 灯光秀与主演出',
        vip: 'VIP 卡座 · 16m 层级 · 专属观演',
        danceA: 'A 舞池 · 热力最高',
        danceB: 'B 舞池 · 电子主场',
        food: '美食服务区 · 补给与休息',
        gate: '主出入口 · 进场流线起点',
      };
      openCard('场馆区域', pr.name, hint[pr.areaType] || '');
    });

    var stageC = centroidOfFeature(GEOJSON.features[0]);
    layers.stageRing = new TMap.MultiCircle({
      id: 'stage-ring',
      map: null,
      zIndex: 55,
      styles: {
        ring: new TMap.CircleStyle({
          color: 'rgba(255,255,255,0.08)',
          showBorder: true,
          borderColor: 'rgba(255,255,255,0.75)',
          borderWidth: 2,
        }),
      },
      geometries: [{
        id: 'ring1',
        styleId: 'ring',
        center: latLng(stageC.lat, stageC.lng),
        radius: 35,
      }],
    });

    heatState = [];
    ['danceA', 'danceB'].forEach(function (type) {
      var feat = GEOJSON.features.filter(function (f) { return f.properties.areaType === type; })[0];
      if (!feat) return;
      var c = centroidOfFeature(feat);
      for (var i = 0; i < 5; i++) {
        heatState.push({
          id: 'h-' + type + i,
          center: latLng(c.lat + (i - 2) * 0.00006, c.lng + (i % 2) * 0.00005),
          baseR: 22 + i * 4,
          phase: i * 0.7,
        });
      }
    });
    layers.heat = new TMap.MultiCircle({
      id: 'heat',
      map: null,
      zIndex: 54,
      styles: {
        heat: new TMap.CircleStyle({
          color: 'rgba(255, 85, 170, 0.22)',
          showBorder: false,
        }),
      },
      geometries: heatState.map(function (h) {
        return { id: h.id, styleId: 'heat', center: h.center, radius: h.baseR };
      }),
    });

    var friends = [
      { id: 'f1', name: 'Nova', lat: 22.69655, lng: 113.7739, color: '#ff55aa' },
      { id: 'f2', name: 'Kira', lat: 22.69648, lng: 113.7752, color: '#55ccff' },
      { id: 'f3', name: 'Milo', lat: 22.6971, lng: 113.7745, color: '#aaff66' },
      { id: 'f4', name: 'Zed', lat: 22.698, lng: 113.774, color: '#ffaa44' },
    ];
    layers.friends = new TMap.MultiMarker({
      id: 'friends',
      map: null,
      zIndex: 80,
      styles: {
        fr: new TMap.MarkerStyle({
          width: 32, height: 32, anchor: { x: 16, y: 16 },
          src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="13" fill="#120a22" stroke="#ff99dd" stroke-width="2.5"/></svg>'),
        }),
      },
      geometries: friends.map(function (f) {
        return { id: f.id, styleId: 'fr', position: latLng(f.lat, f.lng), properties: f };
      }),
    });
    layers.friends.on('click', function (evt) {
      var p = evt.geometry && evt.geometry.properties;
      if (p) openCard('好友', p.name, '正在舞池附近 · 可发起组队');
    });

    var linePairs = [[0,1],[1,2],[2,3],[0,2]];
    var lineGeoms = linePairs.map(function (pair, i) {
      var a = friends[pair[0]], b = friends[pair[1]];
      return {
        id: 'line-' + i,
        styleId: 'glow',
        paths: [latLng(a.lat, a.lng), latLng(b.lat, b.lng)],
      };
    });
    layers.friendLines = new TMap.MultiPolyline({
      id: 'friend-lines',
      map: null,
      zIndex: 75,
      styles: {
        glow: new TMap.PolylineStyle({
          color: 'rgba(200, 120, 255, 0.75)',
          width: 3,
          lineCap: 'round',
          borderColor: 'rgba(255,255,255,0.35)',
          borderWidth: 1,
        }),
      },
      geometries: lineGeoms,
    });

    var gate = GEOJSON.features.filter(function (f) { return f.properties.areaType === 'gate'; })[0];
    var stage = GEOJSON.features.filter(function (f) { return f.properties.areaType === 'stage'; })[0];
    var gC = centroidOfFeature(gate);
    var sC = centroidOfFeature(stage);
    navPath = [
      latLng(gC.lat, gC.lng),
      latLng((gC.lat + sC.lat) / 2 - 0.00015, (gC.lng + sC.lng) / 2 - 0.0001),
      latLng((gC.lat + sC.lat) / 2 + 0.0001, (gC.lng + sC.lng) / 2 + 0.00012),
      latLng(sC.lat, sC.lng),
    ];
    layers.navLine = new TMap.MultiPolyline({
      id: 'nav-line',
      map: null,
      zIndex: 76,
      styles: {
        nav: new TMap.PolylineStyle({
          color: 'rgba(120, 255, 200, 0.9)',
          width: 5,
          lineCap: 'round',
          borderColor: 'rgba(255,255,255,0.5)',
          borderWidth: 1,
          dashArray: [12, 10],
        }),
      },
      geometries: [{ id: 'nav', styleId: 'nav', paths: navPath }],
    });
  }

  function centroidOfFeature(f) {
    var ring = f.geometry.coordinates[0];
    var n = ring.length - 1;
    var lng = 0, lat = 0;
    for (var i = 0; i < n; i++) {
      lng += ring[i][0]; lat += ring[i][1];
    }
    return { lat: lat / n, lng: lng / n };
  }
  function hexToRgba(hex, a) {
    var h = hex.replace('#', '');
    var r = parseInt(h.slice(0, 2), 16);
    var g = parseInt(h.slice(2, 4), 16);
    var b = parseInt(h.slice(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function showCityLayers(on) {
    setLayerVisible(layers.hallPulse, on);
    setLayerVisible(layers.hallHit, on);
    setLayerVisible(layers.clubs, on);
    setLayerVisible(layers.cyan, on);
    setLayerVisible(layers.stormLogo, on);
    setLayerVisible(layers.crowd, on);
  }
  function showVenueLayers(on) {
    setLayerVisible(layers.venueBlocks, on);
    setLayerVisible(layers.stageRing, on);
    setLayerVisible(layers.heat, on);
    setLayerVisible(layers.friends, on);
    setLayerVisible(layers.friendLines, on);
    setLayerVisible(layers.navLine, on);
  }

  function enterVenue() {
    if (layerMode === 'venue') return;
    layerMode = 'venue';
    setHud('venue');
    closeCard();
    showCityLayers(false);
    showVenueLayers(true);
    easeMap({
      center: latLng(VENUE.lat, VENUE.lng),
      zoom: 17.4,
      pitch: 45,
      rotation: -8,
    }, 1400);
    postToMiniProgram({ layer: 'venue' });
  }

  function exitVenue() {
    if (layerMode === 'city') return;
    layerMode = 'city';
    setHud('city');
    closeCard();
    showVenueLayers(false);
    showCityLayers(true);
    easeMap({
      center: latLng(SHENZHEN.lat, SHENZHEN.lng),
      zoom: 11.2,
      pitch: 45,
      rotation: -12,
    }, 1400);
    postToMiniProgram({ layer: 'city' });
  }

  $('btnBack').addEventListener('click', exitVenue);

  function tick() {
    var t = (performance.now() - t0) / 1000;
    pulsePhase = t;

    if (layerMode === 'city' && layers.hallPulse) {
      var alpha = 0.28 + Math.sin(t * 3.2) * 0.18;
      try {
        layers.hallPulse.setStyles({
          pulse: new TMap.PolygonStyle({
            color: 'rgba(255, 40, 120, ' + alpha + ')',
            showBorder: true,
            borderColor: 'rgba(255, 120, 200, ' + (0.7 + Math.sin(t * 4) * 0.3) + ')',
            borderWidth: 2,
          }),
        });
      } catch (e) { /* ignore */ }

      if (layers.crowd && crowdState.length) {
        var moved = false;
        crowdState.forEach(function (u) {
          u.lat += (u.tLat - u.lat) * 0.018;
          u.lng += (u.tLng - u.lng) * 0.018;
          if (Math.abs(u.tLat - u.lat) > 0.00001) moved = true;
        });
        if (moved) {
          layers.crowd.updateGeometries(crowdState.map(function (u) {
            return { id: u.id, styleId: 'ava', position: latLng(u.lat, u.lng), properties: u };
          }));
        }
      }
    }

    if (layerMode === 'venue') {
      if (layers.stageRing) {
        var r = 30 + Math.sin(t * 2.8) * 12;
        try {
          var stageC = centroidOfFeature(GEOJSON.features[0]);
          layers.stageRing.updateGeometries([{
            id: 'ring1',
            styleId: 'ring',
            center: latLng(stageC.lat, stageC.lng),
            radius: r,
          }]);
        } catch (e) { /* ignore */ }
      }
      if (layers.heat && heatState.length) {
        try {
          layers.heat.updateGeometries(heatState.map(function (h) {
            var r = h.baseR + Math.sin(t * 2 + h.phase) * 8;
            return { id: h.id, styleId: 'heat', center: h.center, radius: r };
          }));
        } catch (e) { /* ignore */ }
      }
      if (layers.friends) {
        try {
          var geoms = layers.friends.getGeometries();
          if (geoms && geoms.length) {
            layers.friends.updateGeometries(geoms.map(function (g, i) {
              var pos = g.position;
              var lat = pos.getLat() + Math.sin(t * 2.2 + i) * 0.000015;
              var lng = pos.getLng() + Math.cos(t * 1.8 + i) * 0.000012;
              return {
                id: g.id,
                styleId: g.styleId,
                position: latLng(lat, lng),
                properties: g.properties,
              };
            }));
          }
        } catch (e) { /* ignore */ }
      }
      if (layers.navLine) {
        try {
          var offset = Math.floor(t * 40) % 22;
          layers.navLine.setStyles({
            nav: new TMap.PolylineStyle({
              color: 'rgba(120, 255, 200, 0.92)',
              width: 5,
              lineCap: 'round',
              borderColor: 'rgba(255,255,255,0.45)',
              borderWidth: 1,
              dashArray: [12, 10],
              dashOffset: offset,
            }),
          });
        } catch (e) { /* ignore */ }
      }
    }

    requestAnimationFrame(tick);
  }

  function initMap() {
    if (!MAP_KEY) {
      showErr('请在 URL 传入腾讯地图 Key：?key=你的Key');
      return;
    }
    if (typeof TMap === 'undefined') {
      showErr('TLBS GL 脚本加载失败');
      return;
    }

    map = new TMap.Map(document.getElementById('map'), {
      center: latLng(SHENZHEN.lat, SHENZHEN.lng),
      zoom: 11.2,
      pitch: 45,
      rotation: -12,
      viewMode: '3D',
      showControl: false,
      baseMap: {
        type: 'vector',
        features: ['base', 'building3d', 'label', 'point'],
      },
      mapStyleId: 'style1',
    });

    buildCityLayers();
    buildVenueLayers();
    showVenueLayers(false);

    map.on('click', function (evt) {
      if (layerMode !== 'city' || !evt || !evt.latLng) return;
      var lat = evt.latLng.getLat();
      var lng = evt.latLng.getLng();
      if (
        lat >= HALL.minLat - 0.0003 && lat <= HALL.maxLat + 0.0003 &&
        lng >= HALL.minLng - 0.0003 && lng <= HALL.maxLng + 0.0003
      ) {
        enterVenue();
      }
    });

    $('loader').classList.add('hidden');
    requestAnimationFrame(tick);

    if (INIT_LAYER === 'venue') {
      setTimeout(enterVenue, 600);
    } else {
      setTimeout(function () {
        easeMap({ center: latLng(VENUE.lat, VENUE.lng), zoom: 12.8 }, 1800);
      }, 800);
    }
  }

  function loadGl() {
    var s = document.createElement('script');
    s.src = 'https://map.qq.com/api/gljs?v=1.exp&key=' + encodeURIComponent(MAP_KEY);
    s.onload = function () {
      setTimeout(initMap, 50);
    };
    s.onerror = function () {
      showErr('无法加载 map.qq.com/api/gljs，请检查网络与 Key');
    };
    document.head.appendChild(s);
  }

  var wxScript = document.createElement('script');
  wxScript.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
  document.head.appendChild(wxScript);

  if (!MAP_KEY) {
    showErr('缺少 key 参数。小程序 web-view 会自动附带 TARO_APP_QQ_MAP_KEY。');
  } else {
    loadGl();
  }
})();
  </script>
</body>
</html>
