services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
        required: false
    ports:
      - '3000:3000'
    env_file:
      - path: .env
        required: false
      - path: .env.production
        required: false
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/sync-app
      - REDIS_URL=redis://redis:6379
      - SEED_DEMO_DATA=false
      # Enable Chroma RAG: docker compose --profile chroma up -d
      # and set CHROMA_URL=http://chroma:8000 in .env.production
      # - CORS_ORIGINS=https://h5.your-domain.com

  chroma:
    profiles: [chroma]
    image: ${CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8000/api/v1/heartbeat']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mongo_data:
  redis_data:
  chroma_data:
