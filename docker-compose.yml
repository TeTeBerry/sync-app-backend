# 默认启动 MongoDB + Redis；Chroma 可选：docker compose --profile chroma up -d chroma → :8000
services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # 可选：docker compose --profile chroma up -d chroma
  chroma:
    profiles: [chroma]
    image: ${CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  mongo_data:
  redis_data:
  chroma_data:
